# Syncs the "qui" item from the Kubernetes 1Password vault into a Secret named
# "qui-secrets". The item's field labels become the Secret's keys, so name the
# field exactly:
#   QUI__SESSION_SECRET   (generate with: openssl rand -hex 32)
#
# qui encrypts the stored qBittorrent credentials with this session secret, so it
# must stay stable — changing it makes saved instances un-decryptable. Keeping it
# in 1Password (not git) means it survives pod restarts and PVC loss.
apiVersion: onepassword.com/v1
kind: OnePasswordItem
metadata:
  name: qui-secrets
  namespace: download
spec:
  itemPath: "vaults/Kubernetes/items/qui"
