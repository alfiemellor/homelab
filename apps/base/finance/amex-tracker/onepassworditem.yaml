# Syncs the "amex-tracker" item from the Kubernetes 1Password vault into a
# Secret named "amex-tracker-secrets" (referenced by values.yaml -> existingSecret).
# The item's field labels become the Secret's keys, so name the fields exactly:
#   AMEX_GOOGLE_CLIENT_ID, AMEX_GOOGLE_CLIENT_SECRET, AMEX_SESSION_SECRET,
#   AMEX_GOCARDLESS_SECRET_ID, AMEX_GOCARDLESS_SECRET_KEY,
#   AMEX_AUTH_OWNER_EMAILS, AMEX_AUTH_MEMBER_EMAILS, AMEX_SUPPLEMENTARY_NAMES
# (the last three are personal, so they live here rather than in git.)
apiVersion: onepassword.com/v1
kind: OnePasswordItem
metadata:
  name: amex-tracker-secrets
  namespace: finance
spec:
  itemPath: "vaults/Kubernetes/items/amex-tracker"
