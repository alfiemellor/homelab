{{- if not .Values.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "amex-tracker.fullname" . }}-secrets
  labels:
    {{- include "amex-tracker.labels" . | nindent 4 }}
type: Opaque
stringData:
  AMEX_GOOGLE_CLIENT_ID: {{ .Values.auth.googleClientId | quote }}
  AMEX_GOOGLE_CLIENT_SECRET: {{ .Values.auth.googleClientSecret | quote }}
  AMEX_SESSION_SECRET: {{ .Values.auth.sessionSecret | quote }}
  AMEX_GOCARDLESS_SECRET_ID: {{ .Values.gocardless.secretId | quote }}
  AMEX_GOCARDLESS_SECRET_KEY: {{ .Values.gocardless.secretKey | quote }}
  # Personal: kept out of ConfigMap/git. In production these come from the
  # OnePasswordItem instead (set existingSecret).
  AMEX_AUTH_OWNER_EMAILS: {{ .Values.auth.ownerEmails | quote }}
  AMEX_AUTH_MEMBER_EMAILS: {{ .Values.auth.memberEmails | quote }}
  AMEX_SUPPLEMENTARY_NAMES: {{ .Values.app.supplementaryNames | quote }}
  {{- if .Values.externalDatabaseUrl }}
  AMEX_DATABASE_URL: {{ .Values.externalDatabaseUrl | quote }}
  {{- end }}
{{- end }}
