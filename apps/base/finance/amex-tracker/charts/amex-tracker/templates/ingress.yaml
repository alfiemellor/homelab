apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "amex-tracker.fullname" . }}
  labels:
    {{- include "amex-tracker.labels" . | nindent 4 }}
  annotations:
    cert-manager.io/cluster-issuer: {{ .Values.ingress.clusterIssuer | quote }}
    kubernetes.io/tls-acme: "true"
    external-dns.alpha.kubernetes.io/hostname: {{ .Values.host | quote }}
    {{- with .Values.ingress.annotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  ingressClassName: {{ .Values.ingress.className }}
  tls:
    - hosts:
        - {{ .Values.host }}
      secretName: {{ .Values.ingress.tlsSecretName }}
  rules:
    - host: {{ .Values.host }}
      http:
        paths:
          # API + auth + healthcheck go to the backend.
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: {{ include "amex-tracker.fullname" . }}-backend
                port:
                  number: 8000
          # Everything else is the static SPA.
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "amex-tracker.fullname" . }}-frontend
                port:
                  number: 80
